<!-- Also inherits the base template from the base.html in global template folder -->

{% extends 'base.html' %}

	{% block content %}
	<h1> Task List</h1>
	<ul>
		{% for task in task_list %}
		<li> 
			<a href = "{{ task.get_absolute_url }}">
				{{ task }} 
			</a>
		</li>
		{% endfor %}
	</ul>

	<form method = "POST">
		{% csrf_token %}
		<!--Cross Site Request Forgery Token-->

		<input type = "text" name = "task_name">
		<input type = "submit" name = "submit" value = "Save Form">

	</form>

{% endblock %}
